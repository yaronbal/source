<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>כאן 11 שידור חי</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <video id="player" controls autoplay ></video>

  <script>
    var videoUrl = 'https://n-121-7.il.cdn-redge.media/livehls/oil/kancdn-live/live/kan11/live.livx/playlist.m3u8?bitrate=2940000&videoId=4&renditions&fmp4';
    var audioUrl = 'https://n-121-7.il.cdn-redge.media/livehls/oil/kancdn-live/live/kan11/live.livx/playlist.m3u8?bitrate=192000&audioId=1&lang=pol&renditions&fmp4';

    var masterPlaylist = [
      '#EXTM3U',
      '#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Audio",DEFAULT=YES,URI="' + audioUrl + '"',
      '#EXT-X-STREAM-INF:BANDWIDTH=2940000,CODECS="avc1.640028,mp4a.40.2",AUDIO="audio"',
      videoUrl
    ].join('\n');

    var blob = new Blob([masterPlaylist], { type: 'application/vnd.apple.mpegurl' });
    var blobUrl = URL.createObjectURL(blob);

    var video = document.getElementById('player');

    if (Hls.isSupported()) {
      var hls = new Hls({
        xhrSetup: function(xhr) {
          xhr.setRequestHeader('Referer', 'https://gurutv.online/');
        }
      });
      hls.loadSource(blobUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.log('Error:', data.type, data.details, data.fatal);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = blobUrl;
      video.play();
    }
  </script>

</body>
</html>
