<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i24 News שידור חי</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <video id="player" controls autoplay ></video>

  <script>
    var BASE = 'https://fastly.live.brightcove.com/6386790215112/eu-central-1/5377161796001/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJob3N0IjoiZXJmajYzLmVncmVzcy53YzQ3bTEiLCJhY2NvdW50X2lkIjoiNTM3NzE2MTc5NjAwMSIsImVobiI6ImZhc3RseS5saXZlLmJyaWdodGNvdmUuY29tIiwiaXNzIjoiYmxpdmUtcGxheWJhY2stc291cmNlLWFwaSIsInN1YiI6InBhdGhtYXB0b2tlbiIsImF1ZCI6WyI1Mzc3MTYxNzk2MDAxIl0sImp0aSI6IjYzODY3OTAyMTUxMTIifQ.8ZawImK7DfcrrXeAT2OVZ62qQJrJiBaoc7Y1DNNq1bg/';

    var masterPlaylist = [
      '#EXTM3U',
      '#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Audio",DEFAULT=YES,URI="' + BASE + 'chunklist__audio0.m3u8"',
      '#EXT-X-STREAM-INF:BANDWIDTH=2940000,CODECS="avc1.640028,mp4a.40.2",AUDIO="audio"',
      BASE + 'chunklist__4.m3u8'
    ].join('\n');

    var blob = new Blob([masterPlaylist], { type: 'application/vnd.apple.mpegurl' });
    var blobUrl = URL.createObjectURL(blob);

    var video = document.getElementById('player');

    if (Hls.isSupported()) {
      var hls = new Hls({
        xhrSetup: function(xhr) {
          xhr.setRequestHeader('Referer', 'https://gurutv.online/');
        }
      });
      hls.loadSource(blobUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.log('Error:', data.type, data.details, data.fatal);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = blobUrl;
      video.play();
    }
  </script>

</body>
</html>
