<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ערוץ הכנסת שידור חי</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <video id="player" controls autoplay 
    poster="https://www.knesset.tv/media/3939/knesset-default.jpg">
  </video>

  <script>
    var streamUrl = 'https://kneset.gostreaming.tv/p2-kneset/_definst_/myStream/playlist.m3u8';
    var video = document.getElementById('player');

    if (Hls.isSupported()) {
      var hls = new Hls({
        xhrSetup: function(xhr) {
          xhr.setRequestHeader('Referer', 'https://watch.knesset.tv/');
        }
      });
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.log('Error:', data.type, data.details, data.fatal);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.play();
    }
  </script>

</body>
</html>
